<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIOR — Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="index.html">DIOR</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="designer.html">Designer</a></li>
    <li><a href="women.html">Women</a></li>
    <li><a href="fragrances.html">Fragrances</a></li>
  </ul>
  <div class="nav-icons"><a href="cart.html">&#128722;</a><button class="menu-toggle" id="menu-toggle">&#9776;</button></div>
</nav>

<section class="section checkout-page">
  <div class="checkout-layout">
    <div class="checkout-form">
      <h1 class="page-title fade-in">Checkout</h1>
      <div class="checkout-card reveal">
        <h2>Shipping Address</h2>
        <div class="form-group"><label>Email</label><input type="email" placeholder="your@email.com"></div>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" placeholder="First Name"></div>
          <div class="form-group"><label>Last Name</label><input type="text" placeholder="Last Name"></div>
        </div>
        <div class="form-group"><label>Address</label><input type="text" placeholder="Street Address"></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" placeholder="City"></div>
          <div class="form-group"><label>ZIP / Postal Code</label><input type="text" placeholder="ZIP Code"></div>
        </div>
      </div>
      <div class="checkout-card reveal">
        <h2>Delivery Method</h2>
        <label class="delivery-option selected">
          <input type="radio" name="delivery" checked>
          <div class="delivery-info"><strong>Standard Delivery</strong><span>3–5 Business Days</span></div>
          <span class="delivery-price">Free</span>
        </label>
        <label class="delivery-option">
          <input type="radio" name="delivery">
          <div class="delivery-info"><strong>Express Delivery</strong><span>1–2 Business Days</span></div>
          <span class="delivery-price">$25.00</span>
        </label>
      </div>
      <div class="checkout-card reveal">
        <h2>Payment</h2>
        <div class="form-group"><label>Card Number</label><input type="text" placeholder="&#128179; 0000 0000 0000 0000"></div>
        <div class="form-row">
          <div class="form-group"><label>Expiry Date</label><input type="text" placeholder="MM/YY"></div>
          <div class="form-group"><label>CVV</label><input type="text" placeholder="123"></div>
        </div>
      </div>
    </div>

    <div class="order-summary checkout-summary reveal-right">
      <h2>Order Summary</h2>

      <!-- Items injected by script.js -->
      <div id="checkout-items"></div>

      <div class="summary-divider"></div>
      <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span id="checkout-shipping">Free</span></div>
      <div class="summary-row"><span>Taxes</span><span>$0.00</span></div>
      <div class="summary-row summary-total"><span>Total</span><span id="checkout-total">$0.00</span></div>
      <button id="purchaseBtn" class="btn-accent btn-full">Complete Purchase</button>
      <p class="summary-note">&#128274; Secure Checkout</p>
    </div>
  </div>
</section>

<footer class="footer-dark">
  <div class="footer-content"><span class="footer-brand">DIOR</span><span class="footer-copy">© 2025 DIOR. All rights reserved.</span></div>
</footer>
<script src="js/script.js"></script>
</body>
</html>
